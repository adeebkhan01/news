name: Fetch RSS Feeds

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch feeds
        run: |
          node fetch.js --region bd
          node fetch.js --region au
          node fetch.js --region global
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-bd.json data-au.json data-global.json data.json
          git diff --staged --quiet || git commit -m "chore: refresh feeds $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
