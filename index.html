<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bangladesh News — RSS Aggregator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2eb;--surface:#edeade;--card:#ffffff;--border:#ddd9cf;
  --green:#1a7a4a;--green-lt:#1a7a4a;--green-dim:#e6f2ec;
  --red:#c23a3a;--text:#1a1a18;--muted:#7a7568;--accent:#1a7a4a;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;min-height:100vh}
.masthead{border-bottom:1px solid var(--green);background:var(--surface);padding:0 1.5rem;position:sticky;top:0;z-index:100}
.masthead-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:1rem;height:56px}
.logo{font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--green);letter-spacing:-0.02em;display:flex;align-items:center;gap:.5rem}
.logo-flag{width:26px;height:17px;border-radius:2px;background:#006a4e;position:relative;flex-shrink:0}
.logo-flag::after{content:'';width:10px;height:10px;border-radius:50%;background:#f42a41;position:absolute;top:50%;left:9px;transform:translateY(-50%)}
.masthead-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
#refresh-btn{font-size:.8rem;font-weight:500;background:var(--green);color:#fff;border:1px solid var(--green);border-radius:6px;padding:.35rem .75rem;cursor:pointer;display:flex;align-items:center;gap:.4rem;transition:background .15s}
#refresh-btn:hover{background:#155f39;color:#fff}
#refresh-btn.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#lang-toggle{font-size:.8rem;font-weight:500;background:transparent;color:var(--green);border:1px solid var(--green);border-radius:6px;padding:.35rem .75rem;cursor:pointer;transition:all .15s}
#lang-toggle:hover{background:var(--green);color:#fff}
#lang-toggle.bn{background:var(--green);color:#fff}

.search-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem}
.search-bar-inner{max-width:1280px;margin:0 auto;position:relative}
.search-bar-inner svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem .55rem 2.4rem;font-family:var(--sans);font-size:.875rem;color:var(--text);outline:none;transition:border-color .15s}
#search-input::placeholder{color:var(--muted)}
#search-input:focus{border-color:var(--green-lt)}
#search-clear{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;display:none;line-height:1;padding:.2rem}
#search-clear:hover{color:var(--text)}

.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem}
.filter-bar-inner{max-width:1280px;margin:0 auto;display:flex;gap:.4rem;padding:.6rem 0;overflow-x:auto;scrollbar-width:none}
.filter-bar-inner::-webkit-scrollbar{display:none}
.chip{font-size:.75rem;font-weight:500;padding:.3rem .8rem;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip:hover{border-color:var(--green-lt);color:var(--green-lt)}
.chip.active{background:var(--green);border-color:var(--green);color:#fff}


.status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;font-size:.8rem;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green-lt);display:inline-block;margin-right:.4rem;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:border-color .2s,transform .15s}
.card:hover{border-color:var(--green-lt);transform:translateY(-2px)}
.card-thumb{width:100%;height:180px;object-fit:cover;background:var(--surface);display:block;border-bottom:1px solid var(--border)}

.card-body{padding:1rem 1.1rem;flex:1;display:flex;flex-direction:column}
.card-source{font-size:.68rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem}
.source-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-title{font-family:var(--serif);font-size:1rem;font-weight:600;line-height:1.45;color:var(--text);margin-bottom:.6rem;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:.8rem;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.75rem}
.card-meta{font-size:.72rem;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.6rem;border-top:1px solid var(--border)}
.card.featured{grid-column:1/-1;flex-direction:row}
.card.featured .card-thumb{width:380px;min-width:380px;height:auto;border-bottom:none;border-right:1px solid var(--border)}
.card.featured .card-body{padding:1.5rem}
.card.featured .card-title{font-size:1.5rem;-webkit-line-clamp:4}
.card.featured .card-desc{-webkit-line-clamp:3}
@media(max-width:700px){
  .card.featured{flex-direction:column}
  .card.featured .card-thumb{width:100%;min-width:0;height:200px;border-right:none;border-bottom:1px solid var(--border)}
}
.highlight{background:rgba(26,122,74,.12);border-radius:2px;padding:0 1px}

.loading-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.skeleton{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:shimmer 1.5s infinite}
.skeleton-thumb{height:140px;background:var(--surface)}
.skeleton-body{padding:1rem}
.skeleton-line{height:10px;border-radius:4px;background:var(--surface);margin-bottom:8px}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.6}}

.error-box{background:#fdf0f0;border:1px solid #e8b4b4;border-radius:8px;padding:1.5rem;color:#8b2020;margin:2rem 0;text-align:center}
.error-box h3{font-family:var(--serif);margin-bottom:.5rem;font-size:1.1rem}
.error-box p{font-size:.85rem;line-height:1.6}
.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty h3{font-family:var(--serif);color:var(--text);font-size:1.2rem;margin-bottom:.5rem}
footer{margin-top:3rem;padding:1.5rem;text-align:center;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border)}

.content-wrap{max-width:1280px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:200px 1fr;gap:1.5rem;align-items:start}
.sidebar{position:sticky;top:72px}
.sidebar-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:.85rem}
.headlines-list{list-style:none;display:flex;flex-direction:column}
.headline-item{padding:.75rem 0;border-bottom:1px solid var(--border)}
.headline-item:last-child{border-bottom:none}
.headline-time{font-size:.72rem;color:var(--muted);font-family:var(--mono);margin-bottom:.25rem}
.headline-title{font-family:var(--serif);font-size:.875rem;font-weight:600;color:var(--text);line-height:1.4;text-decoration:none;display:block}
.headline-title:hover{color:var(--green)}
.main-col{min-width:0}
.status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;font-size:.8rem;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green-lt);display:inline-block;margin-right:.4rem;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:768px){
  .content-wrap{grid-template-columns:1fr}
  .sidebar{position:static;border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:.5rem}
}

.tooltip{position:fixed;z-index:999;max-width:320px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.10);padding:1rem 1.1rem;pointer-events:none;opacity:0;transition:opacity .15s;font-size:.8rem;line-height:1.6;color:var(--text)}
.tooltip.visible{opacity:1}
.tooltip-source{font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:.5rem;line-height:1.35;font-family:var(--serif)}
.tooltip-summary{color:var(--text);margin-bottom:.5rem}
.tooltip-loading{color:var(--muted);font-style:italic}
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="logo">
      <div class="logo-flag"></div>
      Bangladesh News
    </div>
    <div class="masthead-right">
      <span class="last-updated" id="last-updated">—</span>
      <button id="lang-toggle" onclick="toggleLang()">বাংলা</button>
      <button id="refresh-btn" onclick="loadData()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<div class="search-bar">
  <div class="search-bar-inner">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search-input" type="search" placeholder="Search articles…" oninput="onSearch(this.value)" />
    <button id="search-clear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div id="tooltip" class="tooltip"><div class="tooltip-source" id="tooltip-source"></div><div id="tooltip-body"></div></div>

<div class="filter-bar">
  <div class="filter-bar-inner" id="filter-bar">
    <button class="chip active" onclick="setFilter('all',this)">All Sources</button>
  </div>
</div>

<div class="content-wrap">
  <aside class="sidebar">
    <div class="sidebar-label">Latest</div>
    <ul class="headlines-list" id="headlines-list"></ul>
  </aside>
  <div class="main-col">
    <div class="status-bar">
      <span><span class="status-dot"></span><span id="status-text">Loading…</span></span>
      <span id="article-count"></span>
    </div>
    <div id="feed-container"></div>
  </div>
</div>

<footer>Bangladesh News Feed · 7 outlets · refreshed hourly via GitHub Actions</footer>

<script>
let allArticles  = [];
let allSources   = [];
let activeFilter = 'all';
let searchQuery  = '';
let loading      = false;
let langMode     = 'en'; // 'en' or 'bn'

function escapeHTML(str) {
  return String(str || '').replace(/[&<>"']/g, m =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[m]
  );
}

function highlight(text, query) {
  if (!query) return text;
  var escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="highlight">$1</span>');
}

function toggleLang() {
  langMode = langMode === 'en' ? 'bn' : 'en';
  var btn = document.getElementById('lang-toggle');
  btn.textContent = langMode === 'bn' ? 'English' : 'বাংলা';
  btn.classList.toggle('bn', langMode === 'bn');
  renderArticles();
  showHeadlines(allArticles);
}

function timeAgo(dateStr) {
  const t = Date.parse(dateStr);
  if (!t) return '';
  const diff = (Date.now() - t) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff / 60)    + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600)  + 'h ago';
  return                   Math.floor(diff / 86400) + 'd ago';
}

function onSearch(val) {
  searchQuery = val.trim();
  document.getElementById('search-clear').style.display = searchQuery ? 'block' : 'none';
  renderArticles();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  renderArticles();
}

function buildFilterBar() {
  const counts = {};
  allArticles.forEach(a => { counts[a.sourceId] = (counts[a.sourceId] || 0) + 1; });

  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '<button class="chip ' + (activeFilter === 'all' ? 'active' : '') + '" onclick="setFilter(\'all\',this)">All Sources</button>';

  allSources.forEach(s => {
    const count = counts[s.id] || 0;
    if (!count) return;
    const btn = document.createElement('button');
    btn.className = 'chip' + (activeFilter === s.id ? ' active' : '');
    btn.textContent = s.name + ' (' + count + ')';
    btn.onclick = () => setFilter(s.id, btn);
    bar.appendChild(btn);
  });
}

function setFilter(id, el) {
  activeFilter = id;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderArticles();
}

function renderArticles() {
  const container = document.getElementById('feed-container');
  const q = searchQuery.toLowerCase();

  let articles = activeFilter === 'all'
    ? allArticles
    : allArticles.filter(a => a.sourceId === activeFilter);

  if (q) {
    articles = articles.filter(a =>
      (a.title || '').toLowerCase().includes(q) ||
      (a.desc  || '').toLowerCase().includes(q)
    );
  }

  document.getElementById('article-count').textContent = articles.length + ' articles';

  if (!articles.length) {
    container.innerHTML = '<div class="empty"><h3>No articles found</h3><p>' + (q ? 'Try a different search term.' : 'Try a different source.') + '</p></div>';
    return;
  }

  const featuredIndex = (!q && activeFilter === 'all') ? articles.findIndex(a => a.img) : -1;

  const cards = articles.map((a, i) => {
    const isBn      = langMode === 'bn' && a.titleBn;
    const rawTitle  = escapeHTML(isBn ? a.titleBn : (a.title || 'Untitled'));
    const rawDesc   = escapeHTML(isBn ? (a.descBn || '') : (a.desc || ''));
    const title    = highlight(rawTitle, escapeHTML(searchQuery));
    const desc     = highlight(rawDesc,  escapeHTML(searchQuery));
    const source   = escapeHTML(a.sourceName || 'Unknown');
    const color    = a.sourceColor || '#aaa';
    const link     = a.link || '#';
    const isFeatured = i === featuredIndex;

    const imgHtml = a.img
      ? '<img class="card-thumb" src="' + a.img + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
      : '';

    return '<a class="card' + (isFeatured ? ' featured' : '') + '" href="' + link + '" target="_blank" rel="noopener"'
      + ' data-idx="' + i + '" onmouseenter="onCardEnter(event,this)" onmouseleave="hideTooltip()">'
      + imgHtml
      + '<div class="card-body">'
      + '<div class="card-source">'
      + '<span class="source-dot" style="background:' + color + '"></span>'
      + '<span style="color:' + color + '">' + source + '</span>'
      + '</div>'
      + '<div class="card-title">' + title + '</div>'
      + (desc ? '<div class="card-desc">' + desc + '</div>' : '')
      + '<div class="card-meta">'
      + '<span>' + (timeAgo(a.pubDate) || '—') + '</span>'
      + '<span>↗</span>'
      + '</div>'
      + '</div>'
      + '</a>';
  }).join('');

  container.innerHTML = '<div class="grid">' + cards + '</div>';
}

function showSkeletons() {
  const skel = '<div class="skeleton"><div class="skeleton-thumb"></div><div class="skeleton-body"><div class="skeleton-line" style="width:40%"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:80%"></div></div></div>';
  document.getElementById('feed-container').innerHTML = '<div class="loading-grid">' + Array(9).fill(skel).join('') + '</div>';
}

async function loadData() {
  if (loading) return;
  loading = true;

  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('status-text').textContent = 'Loading…';
  showSkeletons();

  try {
    const base = window.location.pathname.replace(/\/?$/, '/');
    const res  = await fetch(base + 'data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data  = await res.json();
    allArticles = data.articles || [];
    allSources  = data.sources  || [];

    if (data.fetchedAt) {
      const fetched = new Date(data.fetchedAt);
      document.getElementById('last-updated').textContent =
        'Updated ' + fetched.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    }

    showHeadlines(allArticles);
    document.getElementById('status-text').textContent = allArticles.length + ' articles loaded';
    buildFilterBar();
    renderArticles();

  } catch (e) {
    document.getElementById('feed-container').innerHTML =
      '<div class="error-box">'
      + '<h3>Waiting for first data fetch</h3>'
      + '<p>Go to your repo &rarr; <strong>Actions</strong> tab &rarr; <strong>Fetch RSS Feeds</strong> &rarr; <strong>Run workflow</strong>. Once it completes, refresh this page.</p>'
      + '<p style="margin-top:8px;font-size:12px;opacity:.7">Error: ' + escapeHTML(e.message) + '</p>'
      + '</div>';
    document.getElementById('status-text').textContent = 'No data yet';
  }

  btn.classList.remove('spinning');
  loading = false;
}

loadData();

// ── Tooltip ──
const tooltip     = document.getElementById('tooltip');
const tooltipSrc  = document.getElementById('tooltip-source');
const tooltipBody = document.getElementById('tooltip-body');
let tooltipTimer  = null;

function showTooltip(e, article) {
  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(function() {
    tooltipSrc.textContent = article.title || '';
    tooltipSrc.style.color = 'var(--text)';
    if (article.desc) {
      tooltipBody.innerHTML = '<div class="tooltip-summary">' + escapeHTML(article.desc) + '</div>';
    } else {
      tooltipBody.innerHTML = '<div class="tooltip-loading">No summary available</div>';
    }
    positionTooltip(e);
    tooltip.classList.add('visible');
  }, 400);
}

function positionTooltip(e) {
  var x = e.clientX + 16, y = e.clientY + 16;
  if (x + 336 > window.innerWidth)  x = e.clientX - 336;
  if (y + 180 > window.innerHeight) y = e.clientY - 180;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() {
  clearTimeout(tooltipTimer);
  tooltip.classList.remove('visible');
}

document.addEventListener('mousemove', function(e) {
  if (tooltip.classList.contains('visible')) positionTooltip(e);
});

function onCardEnter(e, el) {
  var idx = parseInt(el.getAttribute('data-idx'), 10);
  var q   = searchQuery.toLowerCase();
  var pool = activeFilter === 'all' ? allArticles : allArticles.filter(function(a){ return a.sourceId === activeFilter; });
  if (q) pool = pool.filter(function(a){ return (a.title||'').toLowerCase().includes(q)||(a.desc||'').toLowerCase().includes(q); });
  var article = pool[idx];
  if (article) showTooltip(e, article);
}

// ── Headlines bar ──
function showHeadlines(articles) {
  if (!articles || !articles.length) return;
  var top5 = articles.slice(0, 5);
  var list = document.getElementById('headlines-list');
  list.innerHTML = top5.map(function(a) {
    return '<li class="headline-item">'
      + '<div class="headline-time">' + (timeAgo(a.pubDate) || '—') + '</div>'
      + '<a class="headline-title" href="' + (a.link||'#') + '" target="_blank" rel="noopener">' + escapeHTML((langMode === 'bn' && a.titleBn) ? a.titleBn : (a.title||'')) + '</a>'
      + '</li>';
  }).join('');
}
</script>
</body>
</html>
