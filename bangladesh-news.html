<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>বাংলাদেশ News — RSS Aggregator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e110e;
    --surface:   #161a16;
    --card:      #1c211c;
    --border:    #2a302a;
    --green:     #1a7a4a;
    --green-lt:  #25a862;
    --green-dim: #143d26;
    --red:       #c23a3a;
    --amber:     #d48c22;
    --text:      #e8ead8;
    --muted:     #7a8470;
    --accent:    #b8d48a;
    --serif:     'Playfair Display', Georgia, serif;
    --sans:      'DM Sans', system-ui, sans-serif;
    --mono:      'DM Mono', monospace;
  }

  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Masthead ── */
  .masthead {
    border-bottom: 1px solid var(--green);
    background: var(--surface);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .masthead-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    height: 56px;
  }
  .logo {
    font-family: var(--serif);
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .logo-flag {
    width: 26px;
    height: 17px;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #006a4e;
    position: relative;
  }
  .logo-flag::after {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #f42a41;
    position: absolute;
    left: 9px;
  }
  .masthead-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  #refresh-btn {
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 500;
    background: var(--green-dim);
    color: var(--green-lt);
    border: 1px solid var(--green);
    border-radius: 6px;
    padding: 0.35rem 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: background 0.15s;
  }
  #refresh-btn:hover { background: var(--green); color: #fff; }
  #refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .last-updated {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── Source Filter Bar ── */
  .filter-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
  }
  .filter-bar-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    gap: 0.4rem;
    padding: 0.6rem 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar-inner::-webkit-scrollbar { display: none; }
  .chip {
    font-size: 0.75rem;
    font-weight: 500;
    font-family: var(--sans);
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .chip:hover { border-color: var(--green-lt); color: var(--green-lt); }
  .chip.active {
    background: var(--green);
    border-color: var(--green);
    color: #fff;
  }

  /* ── Layout ── */
  .page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .status-count { font-family: var(--mono); }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green-lt);
    display: inline-block;
    margin-right: 0.4rem;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .card:hover {
    border-color: var(--green-lt);
    transform: translateY(-2px);
  }
  .card-thumb {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: var(--surface);
    display: block;
    border-bottom: 1px solid var(--border);
  }
  .card-thumb-placeholder {
    width: 100%;
    height: 120px;
    background: linear-gradient(135deg, var(--green-dim) 0%, var(--surface) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    font-size: 2rem;
    opacity: 0.4;
  }
  .card-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
  .card-source {
    font-size: 0.68rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .source-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 0.6rem;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 0.75rem;
  }
  .card-meta {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: var(--mono);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 0.6rem;
    border-top: 1px solid var(--border);
  }
  .card-time { }
  .card-arrow { color: var(--green-lt); font-size: 0.9rem; }

  /* ── Featured Card (first article) ── */
  .card.featured {
    grid-column: 1 / -1;
    flex-direction: row;
  }
  .card.featured .card-thumb {
    width: 380px;
    min-width: 380px;
    height: auto;
    border-bottom: none;
    border-right: 1px solid var(--border);
  }
  .card.featured .card-body { padding: 1.5rem 1.5rem; }
  .card.featured .card-title {
    font-size: 1.5rem;
    -webkit-line-clamp: 4;
  }
  .card.featured .card-desc { -webkit-line-clamp: 3; }
  @media (max-width: 700px) {
    .card.featured { flex-direction: column; }
    .card.featured .card-thumb { width: 100%; min-width: 0; height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
  }

  /* ── Loading / Error States ── */
  .loading-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }
  .skeleton {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    animation: shimmer 1.5s infinite;
  }
  .skeleton-thumb { height: 140px; background: var(--surface); }
  .skeleton-body { padding: 1rem; }
  .skeleton-line {
    height: 10px;
    border-radius: 4px;
    background: var(--surface);
    margin-bottom: 8px;
  }
  @keyframes shimmer {
    0%,100% { opacity: 1; } 50% { opacity: 0.6; }
  }
  .error-banner {
    background: #2a0f0f;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    color: #f0a0a0;
    font-size: 0.85rem;
    margin-bottom: 1rem;
  }
  .source-error {
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
  }

  /* ── Empty ── */
  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .empty h3 { font-family: var(--serif); color: var(--text); font-size: 1.2rem; margin-bottom: 0.5rem; }

  /* ── Footer ── */
  footer {
    margin-top: 3rem;
    padding: 1.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<!-- Masthead -->
<header class="masthead">
  <div class="masthead-inner">
    <div class="logo">
      <div class="logo-flag"></div>
      বাংলাদেশ Wire
    </div>
    <div class="masthead-right">
      <span class="last-updated" id="last-updated">—</span>
      <button id="refresh-btn" onclick="loadAll()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<!-- Source Filter -->
<div class="filter-bar">
  <div class="filter-bar-inner" id="filter-bar">
    <button class="chip active" data-source="all" onclick="setFilter('all', this)">All Sources</button>
  </div>
</div>

<!-- Content -->
<main class="page">
  <div class="status-bar">
    <span><span class="status-dot"></span><span id="status-text">Loading feeds…</span></span>
    <span class="status-count" id="article-count"></span>
  </div>
  <div id="feed-container"></div>
</main>

<footer>বাংলাদেশ Wire — aggregates public RSS feeds from major Bangladeshi news outlets · Refreshes every 15 min</footer>

<script>
const PROXY = 'https://api.allorigins.win/get?url=';

const SOURCES = [
  {
    id: 'daily-star',
    name: 'The Daily Star',
    color: '#1a7a4a',
    url: 'https://www.thedailystar.net/frontpage/rss.xml',
    fallbackUrls: ['https://www.thedailystar.net/rss.xml']
  },
  {
    id: 'dhaka-tribune',
    name: 'Dhaka Tribune',
    color: '#c23a3a',
    url: 'https://www.dhakatribune.com/feed/',
    fallbackUrls: []
  },
  {
    id: 'bdnews24',
    name: 'bdnews24',
    color: '#d48c22',
    url: 'https://bdnews24.com/feed/',
    fallbackUrls: []
  },
  {
    id: 'new-age',
    name: 'New Age BD',
    color: '#5580c0',
    url: 'https://www.newagebd.net/feed/',
    fallbackUrls: []
  },
  {
    id: 'financial-express',
    name: 'Financial Express',
    color: '#8e5ba8',
    url: 'https://thefinancialexpress.com.bd/feed/',
    fallbackUrls: []
  },
];

let allArticles = [];
let activeFilter = 'all';

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  return d.textContent || d.innerText || '';
}

function extractImg(item) {
  // Try media:content, enclosure, then description img tag
  const mediaContent = item.querySelector('content');
  if (mediaContent && mediaContent.getAttribute('url')) return mediaContent.getAttribute('url');
  const enclosure = item.querySelector('enclosure');
  if (enclosure && enclosure.getAttribute('url') && enclosure.getAttribute('type')?.startsWith('image')) return enclosure.getAttribute('url');
  const desc = item.querySelector('description')?.textContent || '';
  const m = desc.match(/<img[^>]+src=["']([^"']+)["']/i);
  if (m) return m[1];
  return null;
}

function parseRSS(xml, source) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  const items = doc.querySelectorAll('item');
  return Array.from(items).slice(0, 20).map(item => {
    const title = stripHtml(item.querySelector('title')?.textContent || '').trim();
    const link = item.querySelector('link')?.textContent?.trim()
      || item.querySelector('guid')?.textContent?.trim() || '#';
    const desc = stripHtml(item.querySelector('description')?.textContent || '').slice(0, 200);
    const pubDate = item.querySelector('pubDate')?.textContent || item.querySelector('date')?.textContent || '';
    const img = extractImg(item);
    return { title, link, desc, pubDate, img, source };
  }).filter(a => a.title);
}

async function fetchFeed(source) {
  const urls = [source.url, ...(source.fallbackUrls || [])];
  for (const url of urls) {
    try {
      const res = await fetch(PROXY + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
      if (!res.ok) continue;
      const json = await res.json();
      if (!json.contents) continue;
      const articles = parseRSS(json.contents, source);
      if (articles.length > 0) return { source, articles, ok: true };
    } catch (e) { /* try next */ }
  }
  return { source, articles: [], ok: false };
}

function buildFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `<button class="chip ${activeFilter==='all'?'active':''}" data-source="all" onclick="setFilter('all',this)">All Sources</button>`;
  SOURCES.forEach(s => {
    const count = allArticles.filter(a => a.source.id === s.id).length;
    if (count === 0) return;
    const btn = document.createElement('button');
    btn.className = 'chip' + (activeFilter === s.id ? ' active' : '');
    btn.dataset.source = s.id;
    btn.textContent = s.name + ` (${count})`;
    btn.onclick = () => setFilter(s.id, btn);
    bar.appendChild(btn);
  });
}

function setFilter(id, el) {
  activeFilter = id;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderArticles();
}

function renderArticles() {
  const container = document.getElementById('feed-container');
  const articles = activeFilter === 'all'
    ? allArticles
    : allArticles.filter(a => a.source.id === activeFilter);

  document.getElementById('article-count').textContent = articles.length + ' articles';

  if (articles.length === 0) {
    container.innerHTML = `<div class="empty"><h3>No articles found</h3><p>Try a different source or refresh.</p></div>`;
    return;
  }

  const cards = articles.map((a, i) => {
    const isFeatured = i === 0 && activeFilter === 'all';
    const imgHtml = a.img
      ? `<img class="card-thumb" src="${a.img}" alt="" loading="lazy" onerror="this.parentElement.removeChild(this)">`
      : `<div class="card-thumb-placeholder">📰</div>`;

    return `
      <a class="card${isFeatured ? ' featured' : ''}" href="${a.link}" target="_blank" rel="noopener">
        ${imgHtml}
        <div class="card-body">
          <div class="card-source">
            <span class="source-dot" style="background:${a.source.color}"></span>
            <span style="color:${a.source.color}">${a.source.name}</span>
          </div>
          <div class="card-title">${a.title}</div>
          ${a.desc ? `<div class="card-desc">${a.desc}</div>` : ''}
          <div class="card-meta">
            <span class="card-time">${timeAgo(a.pubDate) || '—'}</span>
            <span class="card-arrow">↗</span>
          </div>
        </div>
      </a>`;
  }).join('');

  container.innerHTML = `<div class="grid">${cards}</div>`;
}

function showSkeletons() {
  const skels = Array.from({length: 9}, () => `
    <div class="skeleton">
      <div class="skeleton-thumb"></div>
      <div class="skeleton-body">
        <div class="skeleton-line" style="width:40%"></div>
        <div class="skeleton-line" style="width:100%"></div>
        <div class="skeleton-line" style="width:85%"></div>
        <div class="skeleton-line" style="width:60%;margin-top:1rem"></div>
      </div>
    </div>`).join('');
  document.getElementById('feed-container').innerHTML = `<div class="loading-grid">${skels}</div>`;
}

async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('status-text').textContent = 'Fetching feeds…';
  showSkeletons();

  const results = await Promise.all(SOURCES.map(fetchFeed));

  const failed = results.filter(r => !r.ok).map(r => r.source.name);
  allArticles = results
    .flatMap(r => r.articles)
    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

  buildFilterBar();
  renderArticles();

  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Updated ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  document.getElementById('status-text').textContent =
    failed.length ? `${SOURCES.length - failed.length}/${SOURCES.length} sources loaded` : 'All sources loaded';
  btn.classList.remove('spinning');
}

// Auto-refresh every 15 min
loadAll();
setInterval(loadAll, 15 * 60 * 1000);
</script>
</body>
</html>
